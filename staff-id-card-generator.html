<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMD Staff ID Card Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #B1083C;
    --brand-dark: #8a0630;
    --navy: #1a1a2e;
    --gold: #c9a227;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Top Bar ── */
  .topbar {
    background: linear-gradient(135deg, var(--navy) 0%, #2d2d4e 100%);
    color: #fff;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .topbar-logo {
    width: 44px; height: 44px;
    background: var(--brand);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 900; color: #fff;
    letter-spacing: -1px;
  }
  .topbar h1 { font-size: 1.1rem; font-weight: 700; }
  .topbar small { font-size: .75rem; color: #aaa; display: block; }

  /* ── Layout ── */
  .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

  .panel {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 16px rgba(0,0,0,.07);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .panel-head {
    background: linear-gradient(90deg, var(--brand), #d13729);
    color: #fff; padding: 13px 22px;
    font-weight: 600; font-size: .9rem;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-body { padding: 22px; }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media(max-width:700px){ .form-grid { grid-template-columns: 1fr; } }

  label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
  input[type=text], select {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid #d1d5db; border-radius: 8px;
    font-size: .88rem; color: #1a1a2e;
    transition: border-color .15s;
    outline: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--brand); }

  .photo-upload {
    border: 2px dashed #d1d5db; border-radius: 10px;
    padding: 14px; text-align: center; cursor: pointer;
    transition: border-color .15s; position: relative;
    overflow: hidden;
  }
  .photo-upload:hover { border-color: var(--brand); }
  .photo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .photo-upload-icon { font-size: 1.8rem; color: #9ca3af; }
  .photo-upload small { display: block; font-size: .75rem; color: #9ca3af; margin-top: 4px; }
  .photo-thumb {
    width: 60px; height: 60px; border-radius: 8px;
    object-fit: cover; margin: 0 auto 4px; display: block;
    border: 2px solid var(--brand);
  }

  .btn {
    padding: 9px 20px; border-radius: 8px; font-size: .86rem;
    font-weight: 600; border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .btn-brand { background: var(--brand); color: #fff; }
  .btn-brand:hover { background: var(--brand-dark); }
  .btn-outline { background: transparent; border: 1.5px solid var(--brand); color: var(--brand); }
  .btn-outline:hover { background: var(--brand); color: #fff; }
  .btn-navy { background: var(--navy); color: #fff; }
  .btn-navy:hover { background: #0e0e1f; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-sm { padding: 6px 14px; font-size: .78rem; }

  .staff-list { display: flex; flex-direction: column; gap: 12px; }
  .staff-row {
    display: flex; align-items: center; gap: 12px;
    background: #fafafa; border: 1px solid #e5e7eb;
    border-radius: 10px; padding: 12px 16px;
  }
  .staff-row img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; border: 2px solid var(--brand); }
  .staff-row-info { flex: 1; }
  .staff-row-info strong { display: block; font-size: .88rem; color: var(--navy); }
  .staff-row-info span { font-size: .75rem; color: #6b7280; }
  .staff-row-actions { display: flex; gap: 8px; }
  .no-staff { text-align: center; color: #9ca3af; padding: 30px; font-size: .9rem; }

  /* ── Cards Preview ── */
  .cards-grid {
    display: flex; flex-wrap: wrap; gap: 40px;
    justify-content: center;
  }

  .card-set { display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .card-label { font-size: .78rem; color: #9ca3af; text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

  /* ── ID Card ── */
  /* Standard CR80: 85.6mm × 53.98mm  →  screen: 323px × 204px  (approx @96dpi) */
  .id-card {
    width: 323px; height: 204px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,.18);
    flex-shrink: 0;
  }

  /* ── FRONT ── */
  .card-front {
    background: #fff;
    display: flex; flex-direction: column;
  }

  .cf-header {
    background: linear-gradient(135deg, var(--brand) 0%, #d13729 60%, #8a0630 100%);
    padding: 9px 12px 9px 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .cf-header-logo {
    width: 28px; height: 28px;
    background: rgba(255,255,255,.2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: .65rem; font-weight: 900; color: #fff;
    letter-spacing: -.5px; text-align: center; line-height: 1.1;
  }
  .cf-header-text { color: #fff; }
  .cf-header-text h2 { font-size: .6rem; font-weight: 800; line-height: 1.2; text-transform: uppercase; letter-spacing: .5px; }
  .cf-header-text p  { font-size: .5rem; color: rgba(255,255,255,.75); }
  .cf-header-qr { margin-left: auto; }
  .cf-header-qr canvas, .cf-header-qr img { border-radius: 4px; }

  .cf-body {
    flex: 1;
    display: flex;
    padding: 10px 12px;
    gap: 12px;
    align-items: center;
  }

  .cf-photo-wrap {
    flex-shrink: 0;
    width: 68px; height: 80px;
    border-radius: 8px;
    border: 2.5px solid var(--brand);
    overflow: hidden;
    background: #f3f4f6;
    display: flex; align-items: center; justify-content: center;
  }
  .cf-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .cf-photo-placeholder { font-size: 2rem; color: #d1d5db; }

  .cf-info { flex: 1; }
  .cf-info .cf-name {
    font-size: .82rem; font-weight: 800; color: var(--navy);
    line-height: 1.2; margin-bottom: 5px;
  }
  .cf-role-badge {
    display: inline-block;
    background: linear-gradient(90deg, var(--brand), #d13729);
    color: #fff; font-size: .58rem; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .4px;
    margin-bottom: 8px;
  }
  .cf-validity {
    font-size: .6rem; color: #6b7280;
    display: flex; align-items: center; gap: 4px;
  }
  .cf-validity strong { color: var(--navy); }

  .cf-footer {
    background: var(--navy);
    padding: 5px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cf-footer span { font-size: .52rem; color: rgba(255,255,255,.5); letter-spacing: .3px; }
  .cf-footer-stripe {
    display: flex; gap: 3px;
  }
  .cf-footer-stripe span {
    width: 14px; height: 4px; border-radius: 2px;
    display: inline-block;
  }

  /* ── BACK ── */
  .card-back {
    background: linear-gradient(160deg, var(--navy) 0%, #2d2d4e 100%);
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .cb-watermark {
    position: absolute;
    font-size: 7rem; font-weight: 900;
    color: rgba(255,255,255,.03);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) rotate(-25deg);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .cb-accent-top {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--brand), #d13729);
  }
  .cb-accent-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--brand), #d13729);
  }

  .cb-qr-wrap {
    background: #fff;
    border-radius: 10px;
    padding: 7px;
    margin-top: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }

  .cb-info {
    margin-top: 10px;
    text-align: center;
  }
  .cb-clinic-name {
    font-size: .62rem; font-weight: 800;
    color: #fff; letter-spacing: .3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .cb-address {
    font-size: .52rem; color: rgba(255,255,255,.65);
    line-height: 1.5; margin-bottom: 3px;
  }
  .cb-phone {
    font-size: .58rem; color: var(--brand);
    font-weight: 700;
  }
  .cb-phone::before { content: '📞 '; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 24px; align-items: center;
  }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; }
    .no-print { display: none !important; }
    .wrap { padding: 0; }
    .panel { box-shadow: none; border: none; }
    .cards-grid { gap: 0; }
    .card-set { page-break-inside: avoid; margin: 8mm; }

    .id-card {
      box-shadow: none !important;
      border: 1px solid #ddd;
    }

    .topbar, .panel-head, .panel-body form,
    .staff-list, .toolbar { display: none !important; }

    #cardsSection { display: block !important; }
    .cards-grid { justify-content: flex-start; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar no-print">
  <div class="topbar-logo">DMD</div>
  <div>
    <h1>Staff ID Card Generator</h1>
    <small>D.M.D Aesthetic, Dental and Hair Transplant Clinic</small>
  </div>
</div>

<div class="wrap">

  <!-- Add Staff Panel -->
  <div class="panel no-print" id="formPanel">
    <div class="panel-head">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Add Staff Member
    </div>
    <div class="panel-body">
      <div class="form-grid">
        <div>
          <label>Full Name *</label>
          <input type="text" id="inp-name" placeholder="e.g. Dr. Ayesha Khan">
        </div>
        <div>
          <label>Role / Designation *</label>
          <input type="text" id="inp-role" placeholder="e.g. Dermatologist">
        </div>
        <div>
          <label>Employee ID (for QR)</label>
          <input type="text" id="inp-id" placeholder="e.g. DMD-2024-001">
        </div>
      </div>
      <div style="margin-top:16px">
        <label>Photo</label>
        <div class="photo-upload" id="photoUploadArea">
          <input type="file" id="inp-photo" accept="image/*">
          <div id="photoPlaceholder">
            <div class="photo-upload-icon">📷</div>
            <small>Click or drag to upload photo (JPG / PNG)</small>
          </div>
          <img id="photoThumb" class="photo-thumb" style="display:none">
        </div>
      </div>
      <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap">
        <button class="btn btn-brand" onclick="addStaff()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add to List
        </button>
        <button class="btn btn-outline" onclick="clearForm()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Staff List Panel -->
  <div class="panel no-print" id="listPanel">
    <div class="panel-head">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Staff List
    </div>
    <div class="panel-body">
      <div class="staff-list" id="staffList">
        <div class="no-staff" id="noStaff">No staff added yet. Use the form above to add staff members.</div>
      </div>
      <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap" id="generateBtns" style="display:none">
        <button class="btn btn-navy" onclick="generateCards()" id="generateBtn" style="display:none">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Generate Cards
        </button>
        <button class="btn btn-brand" onclick="window.print()" id="printBtn" style="display:none">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print All Cards
        </button>
      </div>
    </div>
  </div>

  <!-- Cards Output -->
  <div id="cardsSection" style="display:none">
    <div class="toolbar no-print">
      <button class="btn btn-brand" onclick="window.print()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print All Cards
      </button>
      <button class="btn btn-outline no-print" onclick="scrollBack()">
        ← Back to Editor
      </button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

</div>

<script>
const CLINIC_ADDRESS = 'Super Market, F-6 Markaz, Islamabad';
const CLINIC_FULLNAME = 'D.M.D Aesthetic, Dental & Hair Transplant';
const CLINIC_PHONE = '0333-5560507';
const VALIDITY = '31 Dec 2028';

let staffList = [];
let photoDataURL = null;

// ── Photo upload ──────────────────────────────────────────────────────
document.getElementById('inp-photo').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoDataURL = e.target.result;
    const thumb = document.getElementById('photoThumb');
    thumb.src = photoDataURL;
    thumb.style.display = 'block';
    document.getElementById('photoPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

// ── Add staff ─────────────────────────────────────────────────────────
function addStaff() {
  const name = document.getElementById('inp-name').value.trim();
  const role = document.getElementById('inp-role').value.trim();
  const empId = document.getElementById('inp-id').value.trim();

  if (!name || !role) { alert('Please enter Name and Role.'); return; }

  const staff = {
    id: Date.now(),
    name,
    role,
    empId: empId || `DMD-${new Date().getFullYear()}-${String(staffList.length + 1).padStart(3, '0')}`,
    photo: photoDataURL
  };
  staffList.push(staff);
  renderStaffList();
  clearForm();
}

function clearForm() {
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-role').value = '';
  document.getElementById('inp-id').value = '';
  document.getElementById('inp-photo').value = '';
  document.getElementById('photoThumb').style.display = 'none';
  document.getElementById('photoPlaceholder').style.display = 'block';
  photoDataURL = null;
}

function renderStaffList() {
  const list = document.getElementById('staffList');
  const noStaff = document.getElementById('noStaff');
  const generateBtn = document.getElementById('generateBtn');
  const printBtn = document.getElementById('printBtn');

  if (staffList.length === 0) {
    list.innerHTML = '<div class="no-staff" id="noStaff">No staff added yet. Use the form above to add staff members.</div>';
    generateBtn.style.display = 'none';
    return;
  }
  noStaff && (noStaff.style.display = 'none');

  list.innerHTML = staffList.map((s, i) => `
    <div class="staff-row" id="row-${s.id}">
      ${s.photo
        ? `<img src="${s.photo}" alt="${s.name}">`
        : `<div style="width:44px;height:44px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:2px solid #e5e7eb;">👤</div>`
      }
      <div class="staff-row-info">
        <strong>${s.name}</strong>
        <span>${s.role} &nbsp;·&nbsp; ${s.empId}</span>
      </div>
      <div class="staff-row-actions">
        <button class="btn btn-danger btn-sm" onclick="removeStaff(${s.id})">✕ Remove</button>
      </div>
    </div>
  `).join('');

  generateBtn.style.display = 'inline-flex';
  generateBtn.textContent = '';
  generateBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Generate ${staffList.length} Card${staffList.length > 1 ? 's' : ''}`;
}

function removeStaff(id) {
  staffList = staffList.filter(s => s.id !== id);
  renderStaffList();
  document.getElementById('cardsSection').style.display = 'none';
}

// ── Generate Cards ────────────────────────────────────────────────────
function generateCards() {
  if (staffList.length === 0) return;

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  staffList.forEach((staff, idx) => {
    const set = document.createElement('div');
    set.className = 'card-set';

    // Front
    const frontWrap = document.createElement('div');
    frontWrap.innerHTML = `<div class="card-label">Front — ${staff.name}</div>`;
    const front = buildFront(staff);
    frontWrap.appendChild(front);
    set.appendChild(frontWrap);

    // Back
    const backWrap = document.createElement('div');
    backWrap.innerHTML = `<div class="card-label">Back</div>`;
    const back = buildBack(staff);
    backWrap.appendChild(back);
    set.appendChild(backWrap);

    grid.appendChild(set);

    // Generate QRs after DOM insert
    setTimeout(() => {
      generateQR(`qr-front-${staff.id}`, qrContent(staff), 40);
      generateQR(`qr-back-${staff.id}`,  qrContent(staff), 90);
    }, 50);
  });

  document.getElementById('cardsSection').style.display = 'block';
  document.getElementById('printBtn').style.display = 'inline-flex';
  document.getElementById('cardsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function qrContent(staff) {
  return `DMD Clinic | ${staff.name} | ${staff.role} | ID: ${staff.empId} | Valid: ${VALIDITY}`;
}

function generateQR(containerId, text, size) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  try {
    new QRCode(el, { text, width: size, height: size, colorDark: '#1a1a2e', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  } catch(e) { el.innerHTML = ''; }
}

// ── Build Front Card ──────────────────────────────────────────────────
function buildFront(staff) {
  const card = document.createElement('div');
  card.className = 'id-card card-front';
  card.innerHTML = `
    <!-- Header -->
    <div class="cf-header">
      <div class="cf-header-logo">DMD</div>
      <div class="cf-header-text">
        <h2>D.M.D Aesthetic &amp; Dental</h2>
        <p>Hair Transplant Clinic — Islamabad</p>
      </div>
      <div class="cf-header-qr">
        <div id="qr-front-${staff.id}" style="line-height:0"></div>
      </div>
    </div>

    <!-- Body -->
    <div class="cf-body">
      <div class="cf-photo-wrap">
        ${staff.photo
          ? `<img src="${staff.photo}" alt="${staff.name}">`
          : `<div class="cf-photo-placeholder">👤</div>`
        }
      </div>
      <div class="cf-info">
        <div class="cf-name">${staff.name}</div>
        <div class="cf-role-badge">${staff.role}</div>
        <div class="cf-validity">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Valid Until: <strong>${VALIDITY}</strong>
        </div>
        <div style="font-size:.52rem;color:#9ca3af;margin-top:6px;">ID: ${staff.empId}</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="cf-footer">
      <span>STAFF IDENTITY CARD</span>
      <div class="cf-footer-stripe">
        <span style="background:var(--brand)"></span>
        <span style="background:#d13729"></span>
        <span style="background:#f59e0b"></span>
        <span style="background:#fff;opacity:.3"></span>
      </div>
    </div>
  `;
  return card;
}

// ── Build Back Card ───────────────────────────────────────────────────
function buildBack(staff) {
  const card = document.createElement('div');
  card.className = 'id-card card-back';
  card.innerHTML = `
